name: Cryptgeon QA

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      test_scope:
        description: Tests to run
        required: true
        default: full
        type: choice
        options:
          - full
          - smoke
          - functional
          - regression
          - password
          - bug
      base_url:
        description: Optional Cryptgeon URL override
        required: false
        type: string
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '0 7 * * *'

jobs:
  playwright:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Select test scope
        id: test-scope
        env:
          TEST_SCOPE: ${{ github.event.inputs.test_scope }}
        run: |
          case "${TEST_SCOPE:-full}" in
            smoke) echo "grep=@smoke" >> "$GITHUB_OUTPUT" ;;
            functional) echo "grep=@functional" >> "$GITHUB_OUTPUT" ;;
            regression) echo "grep=@regression" >> "$GITHUB_OUTPUT" ;;
            password) echo "grep=@password" >> "$GITHUB_OUTPUT" ;;
            bug) echo "grep=@bug" >> "$GITHUB_OUTPUT" ;;
            *) echo "grep=" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Run Playwright tests
        id: playwright
        continue-on-error: true
        env:
          CRYPTGEON_BASE_URL_INPUT: ${{ github.event.inputs.base_url }}
          PLAYWRIGHT_JSON_OUTPUT_NAME: playwright-results.json
          TEST_GREP: ${{ steps.test-scope.outputs.grep }}
        run: |
          if [ -n "$CRYPTGEON_BASE_URL_INPUT" ]; then
            export CRYPTGEON_BASE_URL="$CRYPTGEON_BASE_URL_INPUT"
          fi

          if [ -n "$TEST_GREP" ]; then
            npm test -- --grep "$TEST_GREP"
          else
            npm test
          fi

      - name: Check Notion sync configuration
        id: notion
        if: always()
        run: |
          if [ -n "${{ secrets.NOTION_TOKEN }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync results to Notion
        if: always() && steps.notion.outputs.enabled == 'true'
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_TEST_CASES_DATABASE_ID: ${{ vars.NOTION_TEST_CASES_DATABASE_ID }}
          PLAYWRIGHT_JSON_OUTPUT_NAME: playwright-results.json
        run: npm run sync:notion

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Fail workflow if tests failed
        if: steps.playwright.outcome == 'failure'
        run: exit 1
