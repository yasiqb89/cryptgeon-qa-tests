name: Cryptgeon QA

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: '0 7 * * *'

jobs:
  playwright:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Chromium
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        id: playwright
        continue-on-error: true
        env:
          PLAYWRIGHT_JSON_OUTPUT_NAME: playwright-results.json
        run: npm test

      - name: Check Notion sync configuration
        id: notion
        if: always()
        run: |
          if [ -n "${{ secrets.NOTION_TOKEN }}" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Sync results to Notion
        if: always() && steps.notion.outputs.enabled == 'true'
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_TEST_CASES_DATABASE_ID: ${{ vars.NOTION_TEST_CASES_DATABASE_ID }}
          PLAYWRIGHT_JSON_OUTPUT_NAME: playwright-results.json
        run: npm run sync:notion

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

      - name: Fail workflow if tests failed
        if: steps.playwright.outcome == 'failure'
        run: exit 1
